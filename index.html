<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORO User Card - Auto Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bgCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background:#050508;"></canvas>
    
    <div class="header-frame">
        <a href="/" class="title-link">
            <h1 class="title">ORO USER CARD</h1>
        </a>
    </div>
    
    <div class="container">
        <div class="panel">
            <button id="discordLoginBtn" onclick="loginDiscord()" style="background: #5865F2; color: white; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.947 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.946 2.419-2.157 2.419z"/></svg>
                Sync with Discord
            </button>

            <div id="statusInfo" style="display: none; color: #ff7a18; font-family: 'Fredoka'; margin-bottom: 20px; text-align: center;">
                Account Synced!
            </div>
            
            <div class="button-group">
                <button onclick="downloadCard()">Download PNG</button>
            </div>
        </div>
        
        <div class="preview-section">
            <canvas id="cardCanvas" width="800" height="400" style="display: none;"></canvas>
            
            <div class="canvas-loader" id="skeleton">
                <span id="loaderText" style="color: rgba(255,122,24,0.5); font-family: 'Fredoka'; text-transform: uppercase; letter-spacing: 2px;">Waiting for Discord...</span>
            </div>

            <div class="bio-panel">
                <input type="text" id="userBio" placeholder="Your Bio (max 70 chars)" maxlength="70">
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>© 2026 <a href="https://getoro.xyz" target="_blank" class="footer-link">getoro.xyz</a></p>
    </footer>

    <input type="hidden" id="username">
    <input type="hidden" id="date">
    <div id="roles-hidden" style="display:none"></div>

    <script src="script.js"></script>
</body>
</html>
